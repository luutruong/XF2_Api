<xf:formrow rowtype="input"
	label="{$option.title}"
	hint="{$hintHtml}"
	explain="{$explainHtml}"
	html="{$listedHtml}"
	rowclass="{$rowClass}">

	<xf:select name="{$inputName}[]" multiple="multiple" size="10" value="{$choices}">
		<xf:foreach loop="$forumChoices" value="$_opt">
			<xf:option value="{$_opt.value}">{$_opt.label}</xf:option>
		</xf:foreach>
	</xf:select>
</xf:formrow>
